name: Gold Signal Bot 🥇

on:
  schedule:
    - cron: '*/15 * * * *'   # ทุก 15 นาที
  workflow_dispatch:           # กดรันเองได้จาก GitHub UI

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # โหลด state จาก cache (จำ signal ล่าสุดข้ามรอบได้)
      - name: Restore signal state
        uses: actions/cache@v4
        with:
          path: gold_signals/.signal_state.json
          key: signal-state-${{ github.run_id }}
          restore-keys: signal-state-

      - name: Run gold signal analysis
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          SIGNAL_COOLDOWN: '3600'   # ส่งซ้ำได้ทุก 1 ชั่วโมงถ้า signal ยังเหมือนเดิม
          AI_TRADER_ENABLED: ${{ secrets.AI_TRADER_ENABLED || 'false' }}
          AI_TRADER_EMAIL: ${{ secrets.AI_TRADER_EMAIL }}
          AI_TRADER_PASSWORD: ${{ secrets.AI_TRADER_PASSWORD }}
          AI_TRADER_SYMBOL: ${{ vars.AI_TRADER_SYMBOL || 'XAUUSD' }}
          AI_TRADER_MARKET_TYPE: ${{ vars.AI_TRADER_MARKET_TYPE || 'crypto' }}
        run: |
          cd gold_signals
          python main.py --once
