name: XAU/USD Backtest Report

on:
  schedule:
    - cron: '0 1 * * 1'   # Every Monday at 1am UTC
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run backtest and generate HTML report
        run: |
          cd gold_signals
          python backtest.py --html

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/backtest.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update backtest report [skip ci]"
            git push
          fi
